<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        table{
            width: 80%;
            margin: 50px auto;
            border-collapse: collapse;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        caption{
            font-size: 1.8rem;
            font-weight: bold;
            color: #00bcd4;
            margin-bottom: 20px;
        }

        th, td{
            padding: 12px;
            text-align: left;
            font-size: 1rem; /* vale 16px */
            border-bottom: 1px solid #ccc;
        }

        th{
            background-color: #00bcd4; /* Ciano */
            color: #fff;
            text-transform: uppercase;
        }

        thead tr{
            border-bottom: 3px solid #00bcd4;
        }
        tbody tr:hover{
            background-color: #e0f7fa;
        }
        tfoot{
            background-color: #00bcd4;
            color: #fff;
            font-weight: bold;
        }
        tfoot td{
            border-top: 3px solid #fff;
        }
    </style>
</head>
<body>
    <table>
        <caption>Produtos</caption>
        <thead>
            <th>Produto</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Total</th>
        </thead>
        <tbody>
            <tr>
                <td>Iphone 17</td>
                <td>R$ 7.000,00</td>
                <td>5</td>
                <td>R$ 35.000,00</td>
            </tr>
            <tr>
                <td>Samsung S26</td>
                <td>R$ 6500</td>
                <td>2</td>
                <td>R$ 13.000,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3"> Total</td>
                <td>R$ 48.000,00</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
