<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags não Visuais</title>
</head>
<body>
    <h1>Tags não Visuais</h1>
    <!--Tags Semânticas
    
    section - agrupamento temático de conteúdo
    div - divisão ou seção
    article - conteúdo auto contido
    header - cabeçalho do documento
    footer - rodapé do documento
    nav - agrupa os links de navegação
    aside - de lado (ex:aba de navegação lateral) relacionado com o conteúdo em volta
    details - exibe detalhes que pode ser exibidos ou escondido com css -->
    <header>
        <p>Eu sou o cabeçalho de titulo, logo e navegação</p>
    </header>
    <main>
        <section>
            <div>
                <h2>Sou a primeira div</h2>
                <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Pariatur porro doloribus quo nobis cupiditate. Quae, rerum quam? Nobis illum unde asperiores dolores? Modi, aspernatur ipsa.</p>
            </div>
        </section>
    </main>
</body>
</html>
